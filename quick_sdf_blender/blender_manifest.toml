schema_version = "1.0.0"

id = "quick_sdf_blender"
version = "0.7.2"
name = "Quick SDF Paint"
tagline = "Paint face-shadow threshold maps for toon rendering"
maintainer = "hoshino"
type = "add-on"
tags = ["Paint", "Material"]
website = "https://github.com/yeczrtu/QuickSDFBlender"
blender_version_min = "5.1.0"
blender_version_max = "5.3.0"
platforms = ["windows-x64"]
license = ["SPDX:GPL-3.0-or-later"]
copyright = ["2026 hoshino"]

[permissions]
files = "Import masks and export 16-bit threshold textures"

[build]
paths_exclude_pattern = [
  "__pycache__/",
  "/.git/",
  "/bin/Release/",
  "/*.zip",
  "*.pyc",
]
