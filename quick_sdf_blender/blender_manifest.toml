schema_version = "1.0.0"

id = "quick_sdf_blender"
version = "0.3.1"
name = "Quick SDF Studio"
tagline = "Paint toon face shadows with an artist-first angle timeline"
maintainer = "Quick SDF contributors"
type = "add-on"
tags = ["Paint", "Material"]
blender_version_min = "5.1.0"
platforms = ["windows-x64"]
license = ["SPDX:GPL-3.0-or-later"]

[permissions]
files = "Import masks and export 16-bit threshold textures"

[build]
paths_exclude_pattern = [
  "__pycache__/",
  "/.git/",
  "/bin/Release/",
  "/*.zip",
  "*.pyc",
]
